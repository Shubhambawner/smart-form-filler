<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 240px;
            font-family: system-ui, sans-serif;
            padding: 12px;
            margin: 0;
        }

        h3 {
            margin-top: 0;
            color: #333;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 8px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 4px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        input {
            width: 92%;
            margin: 4px 0 8px 0;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .save-btn {
            background-color: #059669;
        }

        .save-btn:hover {
            background-color: #047857;
        }

        hr {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 12px 0;
        }
    </style>
</head>

<body>
    <h3>Smart Job Application Filler</h3>
    <button id="fillBtn">Autofill This Page</button>

    <hr>
    <label style="font-size: 11px; font-weight: bold; color: #4b5563;">GITHUB PROFILE URL</label>
    <input type="text" id="popGithub" placeholder="https://github.com/...">
    <button id="saveBtn" class="save-btn">Save Profile Data</button>

    <script src="popup.js"></script>
</body>

</html>
